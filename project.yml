name: PasteEcho
options:
  bundleIdPrefix: com.pasteecho
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"

settings:
  base:
    INFOPLIST_FILE: Resources/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.pasteecho.app
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: NO

targets:
  PasteEcho:
    type: application
    platform: macOS
    sources:
      - Sources
    resources:
      - Resources/Assets.xcassets
      - Resources/AppIcon.icns
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Resources/PasteEcho.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies: []
